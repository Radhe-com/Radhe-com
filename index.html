<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radhe Radhe 108 Jaap</title>
    
    <style>
        :root {
            --gold: #ffcf40;
            --digital-blue: #00d2ff;
            --glass: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            background: #050505; 
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Divine Digital Background */
        .aura {
            position: fixed;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a2e 0%, #000 70%);
            z-index: -1;
        }

        header {
            text-align: center;
            padding: 50px 20px;
        }

        .main-title {
            font-size: 3.5rem;
            color: var(--gold);
            text-shadow: 0 0 15px rgba(255, 207, 64, 0.6);
            margin: 0;
            font-weight: 800;
        }

        /* Digital Counter */
        .counter-box {
            background: var(--glass);
            border: 1px solid var(--gold);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(15px);
            text-align: center;
            width: 300px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        #count {
            font-size: 6rem;
            color: var(--digital-blue);
            font-family: 'Courier New', monospace;
            display: block;
            margin-bottom: 10px;
        }

        .btn-jap {
            background: var(--gold);
            color: black;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            transition: 0.2s;
        }

        .btn-jap:hover { transform: scale(1.02); background: #fff; }

        /* Chant History */
        #history {
            margin-top: 30px;
            width: 300px;
            height: 200px;
            overflow-y: auto;
            border-left: 2px solid var(--digital-blue);
            padding-left: 15px;
        }

        .line { color: rgba(255,255,255,0.6); padding: 5px 0; font-size: 0.9rem; border-bottom: 1px solid #111; }

        /* Creator Branding (codes_.py) */
        .footer {
            margin-top: auto;
            padding: 40px;
            text-align: center;
        }

        .creator-tag {
            color: var(--digital-blue);
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            background: rgba(0, 210, 255, 0.1);
            padding: 5px 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div class="aura"></div>

    <header>
        <p style="letter-spacing: 5px; color: var(--digital-blue); margin-bottom: 5px;">DIGITAL JAAP</p>
        <h1 class="main-title">राधे राधे</h1>
    </header>

    <div class="counter-box">
        <span id="count">000</span>
        <button class="btn-jap" onclick="increment()">START CHANT</button>
        <p id="done" style="display:none; color: #00ff88; margin-top: 15px; font-weight: bold;">108 Jaap Complete! 🙏</p>
    </div>

    <div id="history"></div>

    <footer class="footer">
        <p style="font-size: 0.8rem; opacity: 0.5;">Developed & Designed by</p>
        <span class="creator-tag">codes_.py</span>
    </footer>

    <script>
        let c = 0;
        function increment() {
            if(c < 108) {
                c++;
                document.getElementById('count').innerText = c.toString().padStart(3, '0');
                
                let h = document.getElementById('history');
                let div = document.createElement('div');
                div.className = 'line';
                div.innerText = c + ". Radhe Radhe";
                h.prepend(div);

                if(c === 108) {
                    document.getElementById('done').style.display = 'block';
                    document.querySelector('.btn-jap').style.display = 'none';
                }
            }
        }
    </script>
</body>
</html>
