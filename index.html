<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>www.radhe.com</title>
    
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/10700/10700688.png" type="image/png">

    <style>
        :root {
            --neon-gold: #ffcc00;
            --neon-blue: #00f2ff;
            --deep-black: #050505;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--deep-black);
            color: white;
            font-family: 'Poppins', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Ambient Background */
        .aura-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #111122 0%, #000 85%);
            z-index: -1;
        }

        header { text-align: center; padding: 30px 0; }

        /* Floating Radha Photo */
        .radha-img {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 3px solid var(--neon-gold);
            box-shadow: 0 0 40px rgba(255, 204, 0, 0.5);
            object-fit: cover;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .title {
            font-size: 3rem;
            color: var(--neon-gold);
            text-shadow: 0 0 15px var(--neon-gold);
            margin: 10px 0;
            font-weight: 800;
        }

        /* Digital Rudraksh Row */
        .rudraksh-row { display: flex; gap: 8px; justify-content: center; margin: 10px 0; }
        .bead {
            width: 12px; height: 12px;
            background: radial-gradient(circle, #795548, #3e2723);
            border-radius: 50%;
            box-shadow: inset -2px -2px 5px #000;
        }

        /* Main Counter Unit */
        .jap-unit {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--neon-blue);
            padding: 40px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
            text-align: center;
            width: 90%;
            max-width: 350px;
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
        }

        #jap-count {
            font-size: 5.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
            font-family: 'Consolas', monospace;
            display: block;
        }

        .btn-action {
            background: linear-gradient(45deg, var(--neon-gold), #ff8800);
            color: #000;
            border: none;
            padding: 15px 45px;
            font-size: 1.3rem;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 25px;
            box-shadow: 0 0 15px rgba(255, 200, 0, 0.4);
            transition: 0.2s;
        }

        .btn-action:active { transform: scale(0.92); }

        /* History List */
        #log {
            margin-top: 25px;
            height: 120px;
            overflow-y: auto;
            width: 100%;
            border-top: 1px solid rgba(255,255,255,0.05);
            font-size: 0.9rem;
        }
        .log-entry { color: var(--neon-gold); opacity: 0.7; padding: 4px; }

        /* CREATOR CARD (SPECIAL) */
        .creator-card {
            margin: 50px 0;
            padding: 15px 30px;
            background: rgba(0, 242, 255, 0.05);
            border-left: 4px solid var(--neon-blue);
            border-right: 4px solid var(--neon-blue);
            border-radius: 10px;
            text-align: center;
            animation: pulse-glow 2s infinite alternate;
        }

        @keyframes pulse-glow {
            from { box-shadow: 0 0 5px rgba(0, 242, 255, 0.2); }
            to { box-shadow: 0 0 20px rgba(0, 242, 255, 0.5); }
        }

        .creator-label { font-size: 0.6rem; letter-spacing: 4px; color: var(--neon-blue); text-transform: uppercase; }
        .creator-handle { font-size: 1.5rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px #fff; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--neon-blue); }
    </style>
</head>
<body>
    <div class="aura-bg"></div>

    <header>
        <img src="https://i.pinimg.com/originals/8a/8a/6a/8a8a6a6f1d0061e88863f8980327f12e.jpg" alt="Radha Rani" class="radha-img">
        <h1 class="title">राधे राधे</h1>
        <div class="rudraksh-row">
            <div class="bead"></div><div class="bead"></div><div class="bead"></div><div class="bead"></div><div class="bead"></div>
        </div>
    </header>

    <main class="jap-unit">
        <span id="jap-count">000</span>
        <button class="btn-action" onclick="addJap()">START JAP</button>
        
        <div id="log"></div>

        <p id="finish" style="display:none; color: #00ff88; margin-top: 20px; font-weight: bold;">
            ✨ Maala Sampoorna! Radhe Radhe! ✨
        </p>
    </main>

    <div class="creator-card">
        <div class="creator-label">Divine Architect</div>
        <div class="creator-handle">codes_.py</div>
    </div>

    <script>
        let counter = 0;
        function addJap() {
            if(counter < 108) {
                counter++;
                document.getElementById('jap-count').innerText = counter.toString().padStart(3, '0');
                
                const log = document.getElementById('log');
                const entry = document.createElement('div');
                entry.className = 'log-entry';
                entry.innerText = counter + ". Radhe Radhe";
                log.prepend(entry);

                if (navigator.vibrate) navigator.vibrate(30);

                if(counter === 108) {
                    document.getElementById('finish').style.display = 'block';
                    document.querySelector('.btn-action').style.display = 'none';
                }
            }
        }
    </script>
</body>
            </html>
